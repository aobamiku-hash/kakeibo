name: Build VSIX

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Package VSIX
        run: npx vsce package --no-dependencies -o my-agent.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-agent-vsix
          path: my-agent.vsix

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: my-agent.vsix